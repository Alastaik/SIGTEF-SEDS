spring:
  application:
    name: sigtef-backend
  datasource:
    url: jdbc:postgresql://localhost:5433/sigtef_db
    username: sigtef_user
    password: sigtef_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: 4b4f3b7b6c5a3a1f8e2d9c4b7a1f5e8d2c6b4a3f9e1d8c5b7a0f3e2d1c6b5a4f # Chave forte gerada para ambiente local (deve ser subsitituida em prod)
    expirationMs: 86400000 # 24 horas em milisegundos

server:
  port: 8081

resend:
  api-key: re_ajAEP6g5_Pewf4QXqEE2Tyfc5aETA3TTY
