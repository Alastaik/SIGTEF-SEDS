version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sigtef_postgres
    environment:
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME:-sigtef_user}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-sigtef_password}
      POSTGRES_DB: ${POSTGRES_DB:-sigtef_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - sigtef-network
    deploy:
      resources:
        limits:
          memory: 1G

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sigtef_backend
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sigtef_db}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME:-sigtef_user}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD:-sigtef_password}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://sigtef.com.br,https://www.sigtef.com.br}
      - JWT_SECRET=${JWT_SECRET:-fallback_secret_only_for_dev_change_it}
      - JAVA_OPTS=${JAVA_OPTS:--Xmx1g -Xms512m}
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - sigtef-network
    deploy:
      resources:
        limits:
          memory: 1.5G

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: sigtef_frontend
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - sigtef-network
    deploy:
      resources:
        limits:
          memory: 512M

  # Nginx Master (Proxy Reverso)
  nginx:
    image: nginx:alpine
    container_name: sigtef_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - sigtef-network

volumes:
  postgres_data:

networks:
  sigtef-network:
    driver: bridge
