version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sigtef_postgres
    environment:
      POSTGRES_USER: sigtef_user
      POSTGRES_PASSWORD: sigtef_password
      POSTGRES_DB: sigtef_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
