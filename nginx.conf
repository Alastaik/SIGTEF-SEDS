server {
    listen 80;
    listen [::]:80;
    server_name sigtef.com.br www.sigtef.com.br;
    server_tokens off;

    # Local para desafio do Certbot (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redireciona todo o tráfego HTTP restante para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sigtef.com.br www.sigtef.com.br;
    server_tokens off;

    # Certificados SSL (Serão gerados pelo Certbot. Descomente após rodar o Certbot pela primeira vez)
    # ssl_certificate /etc/letsencrypt/live/sigtef.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/sigtef.com.br/privkey.pem;
    
    # OBS: Para o Nginx inicializar antes do Certbot rodar, você pode comentar as duas linhas acima
    # temporariamente (como estão agora). Mas, na prática de produção, você vai gerar o cert,
    # descomentar essas linhas e reiniciar o Nginx.

    # Headers de Segurança
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy para API Backend
    location /api/ {
        client_max_body_size 50M;
        
        proxy_pass http://backend:8081/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Proxy para Frontend
    location / {
        proxy_pass http://frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
